# Server configuration
server.port=8080

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:tradingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT configuration
trading.app.jwtSecret=trading-app-jwt-secret-key-32-chars-long-minimal-requirement
trading.app.jwtExpirationMs=86400000

# CORS configuration
trading.app.cors.allowedOrigins=http://localhost:3000
